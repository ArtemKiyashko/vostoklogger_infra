trigger:
  branches:
    include:
      - main
  paths:
    include:
      - '*.bicep'
      - '*.bicepparam'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: 'vostoklogger-secrets'

  - name: azureServiceConnection
    value: 'Azure-ServiceConnection'
  - name: resourceGroupName
    value: 'rsgweprivate-vostoklogger'
  - name: location
    value: 'westeurope'

stages:
  - stage: Validate
    displayName: 'Validate Bicep'
    jobs:
      - job: ValidateBicep
        displayName: 'Validate Bicep'
        steps:
          - task: AzureCLI@2
            displayName: 'Build and Validate'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                if [ -z "$(mqttUsername)" ] || [ -z "$(mqttPassword)" ] || [ -z "$(synapseSqlPassword)" ]; then
                  echo "ERROR: mqttUsername/mqttPassword/synapseSqlPassword are not set in variable group 'vostoklogger-secrets'"
                  exit 1
                fi

                az bicep build --file main.bicep
                az deployment group validate \
                  --resource-group $(resourceGroupName) \
                  --template-file main.bicep \
                  --parameters main.bicepparam \
                  --parameters mqttUsername="$(mqttUsername)" mqttPassword="$(mqttPassword)" synapseSqlPassword="$(synapseSqlPassword)"

  - stage: Deploy
    displayName: 'Deploy Infrastructure'
    dependsOn: Validate
    jobs:
      - job: DeployInfra
        displayName: 'Deploy'
        steps:
          - task: AzureCLI@2
            displayName: 'Deploy Bicep'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                if [ -z "$(mqttUsername)" ] || [ -z "$(mqttPassword)" ] || [ -z "$(synapseSqlPassword)" ]; then
                  echo "ERROR: mqttUsername/mqttPassword/synapseSqlPassword are not set in variable group 'vostoklogger-secrets'"
                  exit 1
                fi

                az group create --name $(resourceGroupName) --location $(location)
                
                # Получить текущий образ Container App если она существует
                CURRENT_IMAGE=$(az containerapp show \
                  --name vostoklogger-mqtt \
                  --resource-group $(resourceGroupName) \
                  --query 'properties.template.containers[0].image' \
                  -o tsv 2>/dev/null || echo "")
                
                # Если Container App существует и образ не placeholder, использовать его
                if [ ! -z "$CURRENT_IMAGE" ] && [[ "$CURRENT_IMAGE" != *"containerapps-helloworld"* ]]; then
                  echo "Сохраняем текущий образ: $CURRENT_IMAGE"
                  az deployment group create \
                    --resource-group $(resourceGroupName) \
                    --template-file main.bicep \
                    --parameters main.bicepparam mqttFilterImage="$CURRENT_IMAGE" \
                    --parameters mqttUsername="$(mqttUsername)" mqttPassword="$(mqttPassword)" synapseSqlPassword="$(synapseSqlPassword)"
                else
                  echo "Используем placeholder образ для первого деплоя"
                  az deployment group create \
                    --resource-group $(resourceGroupName) \
                    --template-file main.bicep \
                    --parameters main.bicepparam \
                    --parameters mqttUsername="$(mqttUsername)" mqttPassword="$(mqttPassword)" synapseSqlPassword="$(synapseSqlPassword)"
                fi

                # Перезапуск MQTT filter после редеплоя инфры
                ACTIVE_REVISION=$(az containerapp revision list \
                  --name vostoklogger-mqtt \
                  --resource-group $(resourceGroupName) \
                  --query "[?properties.active].name" -o tsv 2>/dev/null || echo "")
                if [ ! -z "$ACTIVE_REVISION" ]; then
                  echo "Перезапуск ревизии: $ACTIVE_REVISION"
                  az containerapp revision restart \
                    --name vostoklogger-mqtt \
                    --resource-group $(resourceGroupName) \
                    --revision "$ACTIVE_REVISION"
                else
                  echo "Нет активной ревизии для перезапуска"
                fi
